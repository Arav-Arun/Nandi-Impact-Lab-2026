# ═══════════════════════════════════════════════════════════════════════════
# NANDI - production stack.  Bring the whole system up with one command:
#
#   cp server/.env.example server/.env      # fill in real secrets
#   docker compose -f docker-compose.prod.yml up -d --build
#
# The frontend (nginx) is the only published port (80). It serves the built SPA
# and proxies /api, /uploads and the live-feed WebSocket to the backend.
# Migrations run automatically on backend start; the DB starts CLEAN (no seed).
# Put a TLS-terminating reverse proxy (Caddy / Traefik / cloud LB) in front for
# HTTPS in a real deployment.
# ═══════════════════════════════════════════════════════════════════════════
services:
  db:
    build:
      context: ./server
      dockerfile: docker/postgres.Dockerfile
    image: nandi-postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nandi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-nandi}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nandi} -d ${POSTGRES_DB:-nandi}"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 30s
    restart: unless-stopped

  neo4j:
    image: neo4j:5.22-community
    environment:
      NEO4J_AUTH: "${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-changeme}"
    volumes:
      - neo4jdata:/data
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u ${NEO4J_USER:-neo4j} -p ${NEO4J_PASSWORD:-changeme} 'RETURN 1' || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 40s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redisdata:/data
    restart: unless-stopped

  backend:
    build:
      context: ./server
    image: nandi-backend:latest
    env_file:
      - ./server/.env
    environment:
      # Point at the in-network service hostnames (override any localhost .env values).
      DATABASE_URL: "postgresql+asyncpg://${POSTGRES_USER:-nandi}:${POSTGRES_PASSWORD:-changeme}@db:5432/${POSTGRES_DB:-nandi}"
      NEO4J_URI: "bolt://neo4j:7687"
      NEO4J_USER: "${NEO4J_USER:-neo4j}"
      NEO4J_PASSWORD: "${NEO4J_PASSWORD:-changeme}"
      REDIS_URL: "redis://redis:6379/0"
    volumes:
      - uploads:/app/uploads
    depends_on:
      db: { condition: service_healthy }
      neo4j: { condition: service_healthy }
      redis: { condition: service_started }
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    image: nandi-frontend:latest
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
  neo4jdata:
  redisdata:
  uploads:
